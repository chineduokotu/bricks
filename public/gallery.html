<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BRICKS Media Gallery</title>
  <style>
    body {
      font-family: sans-serif;
      background: #121212;
      color: #fff;
      margin: 20px;
    }
    h1 {
      text-align: center;
    }
    .media-container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
    }
    .media-card {
      background: #2e2e2e;
      border-radius: 4px;
      padding: 10px;
      width: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .media-card img, .media-card video {
      max-width: 100%;
      max-height: 180px;
      object-fit: contain;
      border-radius: 2px;
    }
    .filename {
      font-size: 0.8rem;
      margin-top: 10px;
      word-break: break-all;
      text-align: center;
      color: #ccc;
    }
    .section-title {
      font-size: 1.5rem;
      border-bottom: 1px solid #444;
      padding-bottom: 8px;
      margin: 30px 0 15px 0;
      color: #00bcd4;
    }
  </style>
</head>
<body>
  <h1>BRICKS Media Gallery</h1>
  
  <div class="section-title">Videos (dox_video1.mp4 - dox_video8.mp4)</div>
  <div id="videos-container" class="media-container"></div>

  <div class="section-title">Images (dox11.jpeg - dox53.jpeg)</div>
  <div id="images-container" class="media-container"></div>

  <script>
    const videosContainer = document.getElementById("videos-container");
    const imagesContainer = document.getElementById("images-container");

    // Add videos
    for (let i = 1; i <= 8; i++) {
      const card = document.createElement("div");
      card.className = "media-card";
      
      const media = document.createElement("video");
      media.src = `/images/dox_video${i}.mp4`;
      media.controls = true;
      
      const text = document.createElement("div");
      text.className = "filename";
      text.innerText = `dox_video${i}.mp4`;

      card.appendChild(media);
      card.appendChild(text);
      videosContainer.appendChild(card);
    }

    // Add images
    for (let i = 11; i <= 53; i++) {
      const card = document.createElement("div");
      card.className = "media-card";
      
      const media = document.createElement("img");
      media.src = `/images/dox${i}.jpeg`;
      media.alt = `dox${i}.jpeg`;
      
      const text = document.createElement("div");
      text.className = "filename";
      text.innerText = `dox${i}.jpeg`;

      card.appendChild(media);
      card.appendChild(text);
      imagesContainer.appendChild(card);
    }
  </script>
</body>
</html>

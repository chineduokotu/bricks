<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════
         PRIMARY SEO META TAGS
    ═══════════════════════════════════════ -->
    <title>BRICKS — Luxury Furniture for Intentional Living | Nigeria</title>
    <meta name="description" content="BRICKS is Nigeria's premier luxury furniture brand. Shop premium dining sets, living room sofas, bedroom furniture, coffee tables and décor. Crafted to last, made to be loved." />
    <meta name="keywords" content="luxury furniture Nigeria, buy furniture Lagos, dining table Nigeria, sofa set Nigeria, bedroom furniture Nigeria, living room furniture, marble coffee table, walnut dining set, bouclé sofa, BRICKS furniture, Nigerian interior design, premium home furniture" />
    <meta name="author" content="BRICKS Furniture" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="google-site-verification" content="google7a1a57ddf4f0d27e" />
    <meta name="theme-color" content="#1A1A1A" />

    <!-- ═══════════════════════════════════════
         CANONICAL URL
    ═══════════════════════════════════════ -->
    <link rel="canonical" href="https://www.thebrick.com.ng/" />


    <!-- ═══════════════════════════════════════
         OPEN GRAPH (Facebook, LinkedIn, WhatsApp)
    ═══════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BRICKS Furniture" />
    <meta property="og:title" content="BRICKS — Luxury Furniture for Intentional Living" />
    <meta property="og:description" content="Nigeria's premier luxury furniture brand. Discover premium dining sets, sofas, coffee tables, and bedroom collections crafted for discerning homes." />
    <meta property="og:url" content="https://www.thebrick.com.ng/" />
    <meta property="og:image" content="https://www.thebrick.com.ng/images/dox26.jpeg" />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BRICKS Luxury Furniture — Premium dining sets and living room collections" />
    <meta property="og:locale" content="en_NG" />

    <!-- ═══════════════════════════════════════
         TWITTER CARD
    ═══════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@bricksfurniture" />
    <meta name="twitter:creator" content="@bricksfurniture" />
    <meta name="twitter:title" content="BRICKS — Luxury Furniture for Intentional Living" />
    <meta name="twitter:description" content="Nigeria's premier luxury furniture brand. Shop premium dining sets, sofas, bedroom and décor collections." />
    <meta name="twitter:image" content="https://www.thebrick.com.ng/images/dox26.jpeg" />

    <meta name="twitter:image:alt" content="BRICKS Luxury Furniture" />

    <!-- ═══════════════════════════════════════
         FAVICON & ICONS
    ═══════════════════════════════════════ -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- ═══════════════════════════════════════
         STRUCTURED DATA — Organization (JSON-LD)
    ═══════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FurnitureStore",
      "name": "BRICKS Furniture",
      "url": "https://www.thebrick.com.ng",
      "logo": "https://www.thebrick.com.ng/favicon.png",
      "image": "https://www.thebrick.com.ng/images/dox26.jpeg",

      "description": "Nigeria's premier luxury furniture brand offering premium dining sets, living room sofas, bedroom furniture, coffee tables and décor.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "NG",
        "addressRegion": "Lagos"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "English"
      },
      "sameAs": [
        "https://instagram.com/bricksfurniture",
        "https://twitter.com/bricksfurniture"
      ],
      "priceRange": "₦₦₦",
      "currenciesAccepted": "NGN",
      "paymentAccepted": "Cash, Credit Card, Bank Transfer",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "BRICKS Furniture Collections",
        "itemListElement": [
          { "@type": "OfferCatalog", "name": "Dining Room Furniture" },
          { "@type": "OfferCatalog", "name": "Living Room Furniture" },
          { "@type": "OfferCatalog", "name": "Bedroom Furniture" },
          { "@type": "OfferCatalog", "name": "Home Décor" }
        ]
      }
    }
    </script>

    <!-- ═══════════════════════════════════════
         STRUCTURED DATA — WebSite with SearchAction
    ═══════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BRICKS Furniture",
      "url": "https://www.thebrick.com.ng",

      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.thebrick.com.ng/shop?q={search_term_string}"

        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══════════════════════════════════════
         FONTS
    ═══════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
